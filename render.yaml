services:
  # Python Backend (WebSocket Support)
  - type: web
    name: watchwithmi-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DEBUG
        value: "false"
      - key: PORT
        value: 8000
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: watchwithmi-frontend
          property: host
      - key: YOUTUBE_API_KEY
        sync: false

  # React Frontend (Static Site - defined as a web service with env: static)
  - type: web
    name: watchwithmi-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/out
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: watchwithmi-backend
          property: host
