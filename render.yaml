services:
  # Python Backend (WebSocket Support)
  - type: web
    name: watchwithmi-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free # Change to starter if you need more power
    envVars:
      - key: DEBUG
        value: "false"
      - key: PORT
        value: 8000
      - key: CORS_ALLOWED_ORIGINS
        fromStack: true
        name: watchwithmi-frontend
        property: url
      - key: YOUTUBE_API_KEY
        sync: false # Set this manually in Render dashboard

  # React Frontend (Static Site - Fast & CDN)
  - type: static
    name: watchwithmi-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/out
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromStack: true
        name: watchwithmi-backend
        property: url
