services:
  # Python Backend (WebSocket Support)
  - type: web
    name: watchwithmi-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: DEBUG
        value: "true"
      - key: PORT
        value: 8000
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: watchwithmi-web
          property: host
      - key: YOUTUBE_API_KEY
        sync: false

  # React Frontend (Next.js Node.js Service)
  - type: web
    name: watchwithmi-web
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    plan: free
    region: singapore
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: watchwithmi-backend
          property: host
