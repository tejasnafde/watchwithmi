services:
  # Python Backend (WebSocket Support)
  - type: web
    name: watchwithmi-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DEBUG
        value: "false"
      - key: PORT
        value: 8000
      - key: CORS_ALLOWED_ORIGINS
        fromStack: true
        name: watchwithmi-frontend
        property: url
      - key: YOUTUBE_API_KEY
        sync: false

  # React Frontend (Static Site)
  - type: static_site
    name: watchwithmi-frontend
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/out
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromStack: true
        name: watchwithmi-backend
        property: url
